name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=offensive_it_tester.core --cov-report=term-missing
